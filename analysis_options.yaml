# Analysis options for Obsession Tracker
# Ensures high code quality and consistency across the project
# Line length limit set to 120 characters (modern standard) instead of strict 80

# include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "build/**"
    - "lib/generated/**"
    - "test/.test_coverage.dart"

  strong-mode:
    implicit-casts: false
    implicit-dynamic: false

  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    # Treat specific warnings as errors
    invalid_annotation_target: error
    missing_required_param: error
    missing_return: error
    dead_code: warning
    unused_import: error
    unused_local_variable: error

    # Privacy and security related
    avoid_print: error # No print statements in production

  plugins:
    - dart_code_metrics

linter:
  rules:
    # Error Rules (Critical Issues)
    - avoid_relative_lib_imports
    # - avoid_slow_async_io  # Disabled: async I/O is intentional for UI responsiveness in mobile apps
    - avoid_types_as_parameter_names
    - cancel_subscriptions
    - close_sinks
    - comment_references
    - control_flow_in_finally
    - empty_statements
    - hash_and_equals
    - invariant_booleans
    - literal_only_boolean_expressions
    - no_adjacent_strings_in_list
    - no_duplicate_case_values
    - no_logic_in_create_state
    - prefer_void_to_null
    - test_types_in_equals
    - throw_in_finally
    - unnecessary_statements
    - unrelated_type_equality_checks
    - valid_regexps

    # Style Rules (Code Quality)
    - always_declare_return_types
    # - always_put_control_body_on_new_line  # Very strict formatting rule
    # - always_put_required_named_parameters_first  # Temporarily disabled for cleanup
    # - always_specify_types  # Too strict for lambda parameters
    - always_use_package_imports
    - annotate_overrides
    - avoid_annotating_with_dynamic
    - avoid_as
    - avoid_bool_literals_in_conditional_expressions
    # - avoid_catches_without_on_clauses  # Sometimes generic catches are needed
    - avoid_catching_errors
    - avoid_double_and_int_checks
    - avoid_empty_else
    # - avoid_equals_and_hash_code_on_mutable_classes  # Temporarily disabled for cleanup
    - avoid_escaping_inner_quotes
    - avoid_field_initializers_in_const_classes
    - avoid_function_literals_in_foreach_calls
    - avoid_implementing_value_types
    - avoid_init_to_null
    - avoid_null_checks_in_equality_operators
    # - avoid_positional_boolean_parameters  # Disabled: positional booleans fine in callbacks
    - avoid_print # Critical for privacy - no debug prints
    - avoid_private_typedef_functions
    - avoid_redundant_argument_values
    - avoid_renaming_method_parameters
    - avoid_return_types_on_setters
    - avoid_returning_null_for_void
    - avoid_setters_without_getters
    - avoid_shadowing_type_parameters
    - avoid_single_cascade_in_expression_statements
    - avoid_unnecessary_containers
    - avoid_unused_constructor_parameters
    - avoid_void_async
    - await_only_futures
    - camel_case_extensions
    - camel_case_types
    # - cascade_invocations  # Style preference that doesn't always improve readability
    - cast_nullable_to_non_nullable
    - constant_identifier_names
    # - curly_braces_in_flow_control_structures  # Can be overly verbose for simple statements
    - deprecated_consistency
    - directives_ordering
    - empty_catches
    - empty_constructor_bodies
    - file_names
    - flutter_style_todos
    - implementation_imports
    # - join_return_with_assignment  # Style preference
    - leading_newlines_in_multiline_strings
    - library_names
    - library_prefixes
    - missing_whitespace_between_adjacent_strings
    # - no_default_cases  # Default cases are useful for comprehensive error handling and future-proofing
    - non_constant_identifier_names
    - null_closures
    - one_member_abstracts
    - only_throw_errors
    - overridden_fields
    - package_names
    - parameter_assignments
    - prefer_adjacent_string_concatenation
    - prefer_asserts_in_initializer_lists
    - prefer_asserts_with_message
    - prefer_collection_literals
    - prefer_conditional_assignment
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    # - prefer_constructors_over_static_methods  # Architectural decision
    - prefer_contains
    - prefer_equal_for_default_values
    # - prefer_expression_function_bodies  # Temporarily disabled for cleanup
    - prefer_final_fields
    - prefer_final_in_for_each
    - prefer_final_locals
    - prefer_for_elements_to_map_fromIterable
    - prefer_foreach
    - prefer_function_declarations_over_variables
    - prefer_generic_function_type_aliases
    - prefer_if_elements_to_conditional_expressions
    - prefer_if_null_operators
    - prefer_initializing_formals
    - prefer_inlined_adds
    - prefer_interpolation_to_compose_strings
    - prefer_is_empty
    - prefer_is_not_empty
    - prefer_is_not_operator
    - prefer_iterable_whereType
    - prefer_null_aware_operators
    - prefer_single_quotes
    - prefer_spread_collections
    - prefer_typing_uninitialized_variables
    - provide_deprecation_message
    - recursive_getters
    - slash_for_doc_comments
    - sort_child_properties_last
    # - sort_constructors_first  # Temporarily disabled for cleanup
    # - sort_pub_dependencies  # Can be handled by IDE formatting
    - sort_unnamed_constructors_first
    - type_annotate_public_apis
    - type_init_formals
    # - unawaited_futures  # Often intentional fire-and-forget operations
    - unnecessary_await_in_return
    - unnecessary_brace_in_string_interps
    - unnecessary_const
    - unnecessary_constructor_name
    - unnecessary_getters_setters
    - unnecessary_lambdas
    - unnecessary_new
    - unnecessary_null_aware_assignments
    - unnecessary_null_checks
    - unnecessary_null_in_if_null_operators
    - unnecessary_nullable_for_final_variable_declarations
    - unnecessary_overrides
    - unnecessary_parenthesis
    - unnecessary_raw_strings
    - unnecessary_string_escapes
    - unnecessary_string_interpolations
    - unnecessary_this
    # - use_build_context_synchronously  # Requires careful analysis of async patterns
    - use_colored_box
    - use_decorated_box
    - use_full_hex_values_for_flutter_colors
    - use_function_type_syntax_for_parameters
    # - use_if_null_to_convert_nulls_to_bools  # Style preference
    - use_is_even_rather_than_modulo
    - use_key_in_widget_constructors
    # - use_late_for_private_fields_and_variables  # Disabled: nullable fields are intentional for caching patterns
    - use_named_constants
    - use_raw_strings
    - use_rethrow_when_possible
    # - use_setters_to_change_properties  # Disabled: methods often more readable than setters
    - use_string_buffers
    - use_super_parameters
    - use_test_throws_matchers
    - use_to_and_as_if_applicable
    - void_checks

    # Flutter-specific rules
    - sized_box_for_whitespace

dart_code_metrics:
  anti-patterns:
    - long-method
    - long-parameter-list

  metrics:
    cyclomatic-complexity: 20
    maximum-nesting-level: 5
    number-of-parameters: 4
    source-lines-of-code: 50
    lines-of-code: 120

  metrics-exclude:
    - test/**
    - "**/*.g.dart"
    - "**/*.freezed.dart"

  rules:
    # Architectural rules
    - avoid-late-keyword:
        allow-initialized: true
    - avoid-non-null-assertion
    - avoid-unnecessary-type-assertions
    - avoid-unnecessary-type-casts
    - binary-expression-operand-order
    - double-literal-format
    - newline-before-return
    - no-boolean-literal-compare
    - no-empty-block
    - no-equal-then-else
    - no-object-declaration
    - prefer-conditional-expressions
    - prefer-correct-type-name
    - prefer-first
    - prefer-last
    - prefer-match-file-name
    - prefer-moving-to-variable
    - prefer-trailing-comma

    # Flutter-specific architectural rules
    - always-remove-listener
    - avoid-returning-widgets
    - avoid-unnecessary-setstate
    - avoid-wrapping-in-padding
    - prefer-const-border-radius
    - prefer-extracting-callbacks
    - prefer-single-widget-per-file:
        ignore-private-widgets: true

# Custom rules specific to Obsession Tracker
custom_lint:
  rules:
    # Privacy rules (would be implemented as custom rules)
    # - no_location_logging: Prevent logging GPS coordinates
    # - no_sensitive_data_print: Prevent printing user data
    # - require_encryption_annotation: Require @encrypted for sensitive data
